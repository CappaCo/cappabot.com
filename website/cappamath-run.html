<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <!-- Title the webiste tab -->
        <title>CappaMath</title>
        <!-- Use the pico stylesheet because it looks cool -->
        <link rel="stylesheet" href="/styles/pico.min.css" type="text/css">
        <meta name="viewport" content="width=device-width">
        <meta name="description" content="CappaMath is a math starter that can be used as a warm up for school students.">
        
        <style>
            html {
                font-size: 32px;
            }

            .container {
                max-width: none;
                margin: 0;
                padding: 0;
                width: 100vw;
                height: 100vh;
            }

            .screen {
                display: none;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;  
                
                text-align: center;
                justify-content: space-around;
                flex-direction: column;
            }

            .screen.active {
                display: flex;
            }

            /* start screen */
            /* question screen */
            #questionDisplay {
                font-size: 5em;
            }
        </style>
    </head>
    <body>
        <!-- Main pico container -->
        <main class="container">
            <div id="startScreen" class="screen active">
                <div>
                    <h1>Welcome to CappaMath</h1>
                    <button id="startButton">Start</button>
                </div>
            </div>

            <div id="questionScreen" class="screen">
                <progress id="questionLoadingBar"></progress>
                <span id="questionDisplay">$$2+2$$</span>
            </div>
        </main>
        <script>
            MathJax = {
                tex: {
                    inlineMath: {"[+]": [["$i$", "$$"]]}
                }
            };
        </script>
        <script id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
        <script src="/scripts/cappamath-run.js"></script>
    </body>
</html>
