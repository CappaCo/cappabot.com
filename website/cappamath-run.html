<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <!-- Title the webiste tab -->
        <title>CappaMath</title>
        <!-- Use the pico stylesheet because it looks cool -->
        <link rel="stylesheet" href="/styles/pico.min.css" type="text/css">
        <meta name="viewport" content="width=device-width">
        <meta name="description" content="CappaMath is a math starter that can be used as a warm up for school students.">
        
        <style>
            html {
                font-size: 32px;
            }

            .container {
                max-width: none;
                margin: 0;
                padding: 0;
                width: 100vw;
                height: 100vh;
            }

            .screen {
                display: none;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;  
                
                text-align: center;
                justify-content: space-around;
                flex-direction: column;
            }

            .screen.active {
                display: flex;
            }

            /* start screen */
            /* question screen */
            #questionScreen {
                justify-content: space-between;
            }

            #questionDisplay {
                font-size: 5em;
            }

            /* answers wait screen */
            /* answers screen */
            #answersScreen {
                justify-content: space-between;
            }

            #answersTable {
                width: 100%;
                height: 100%;
            }

            #answersScreen td, #answersScreen th {
                --pico-spacing: 0.2em;
            }
        </style>
    </head>
    <body>
        <!-- Main pico container -->
        <main class="container">
            <div id="startScreen" class="screen">
                <div>
                    <h1>Welcome to CappaMath</h1>
                    <button onclick="startButton()">Start</button>
                </div>
            </div>

            <div id="questionsScreen" class="screen">
                <progress id="questionLoadingBar" style="transition: none; animation: none;"></progress>
                <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
                    <span id="questionDisplay">$$2+2$$</span>
                </div>
                <button onclick="skipToEnd()" style="position: absolute; bottom: 0.5rem; right: 0.5rem; font-size: 0.7rem; padding: 0.5rem;">Skip to end</button>
            </div>

            <div id="answersWaitScreen" class="screen">
                <div>
                    <button onclick="changeScreen('answers')">Show answers</button>
                </div>
            </div>

            <div id="answersScreen" class="screen">
                <table>
                    <thead>
                        <th>#</th>
                        <th>question</th>
                        <th>answer</th>
                    </thead>
                    <tbody id="answersTable">
                        <tr>
                            <td>
                                <i>Loading...</i>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
        <script>
            MathJax = {
                tex: {
                    inlineMath: {"[+]": [["$i$", "$$"]]}
                }
            };
        </script>
        <script id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
        <script src="/scripts/cappamath-run.js"></script>
    </body>
</html>
