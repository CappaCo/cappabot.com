<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <!-- Title the webiste tab -->
        <title>ChatWebview - CappaBot</title>
        <!-- Use the pico stylesheet because it looks cool -->
        <link rel="stylesheet" href="/styles/pico.min.css" type="text/css">
        <meta name="viewport" content="width=device-width">
        <meta name="description" content="CappaChat webview client. Made by CappaBot.">
        <style>
            #chatContainer article {
                flex-direction: column-reverse;
                display: flex;
                height: 50vh;
                overflow-y: auto;
            }

            #messagesField {
                padding: 10px;
            }

            #chatContainer div {
                margin-top: 10px;
                display: flex;
                gap: 10px;
                flex-direction: row;
            }

            #inputField {
                height: auto;
                margin: 0;
            }
        </style>
    </head>
    <body>
        <!-- Main pico container -->
        <main class="container">
            <hgroup>
                <h1><a href="/">CappaBot</a></h1>
                <p>Welcome to the CappaBot website!</p>
            </hgroup>

            <h2>CappaChat online client</h2>

            <section id="chatContainer">
                <article aria-busy="true">
                    <div id="messagesField">
                        <!-- Messages will appear here -->
                    </div>
                </article>
                <div>
                    <button id="changeUsernameButton">Change username</button>
                    <input id="inputField" type="text" placeholder="Type your message...">
                    <button id="sendButton">Send</button>
                </div>
            </section>

            <script src="/scripts/chat.js" type="text/javascript"></script>

            <footer>
                Made by CappaBot<br>
                <a href="/terms-of-service">Terms of service</a> | <a href="/privacy-policy">Privacy policy</a>
            </footer>
        </main>
        <script src="/scripts/main.js" type="text/javascript"></script>
    </body>
</html>
