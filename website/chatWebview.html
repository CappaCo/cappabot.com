<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <!-- Title the webiste tab -->
        <title>ChatWebview - CappaBot</title>
        <!-- Use the pico stylesheet because it looks cool -->
        <link rel="stylesheet" href="/styles/pico.min.css" type="text/css">
        <meta name="viewport" content="width=device-width">
        <meta name="description" content="CappaChat webview client. Made by CappaBot.">
        <style>
            body {
                height: 100vh;
                width: 100vw;
            }

            #chatContainer {
                display: flex;
                flex-direction: column;
                height: 100%;
                width: 100%;
                padding: 20px;
                margin: 0;
            }

            #chatContainer article {
                flex-direction: column-reverse;
                display: flex;
                flex-grow: 1;
                overflow-y: auto;
            }

            #messagesField {
                padding: 10px;
            }

            #chatContainer div {
                margin-top: 10px;
                display: flex;
                gap: 10px;
                flex-direction: row;
            }

            #changeUsernameButton {
                flex-shrink: 0;
            }

            #inputField {
                height: auto;
                margin: 0;
            }
        </style>
    </head>
    <body>
        <section id="chatContainer">
            <h1>CappaChat in a webview</h1>
            <article aria-busy="true">
                <div id="messagesField">
                    <!-- Messages will appear here -->
                </div>
            </article>
            <div>
                <button id="changeUsernameButton">Change username</button>
                <input id="inputField" type="text" placeholder="Type your message...">
                <button id="sendButton">Send</button>
            </div>
        </section>

        <script src="/scripts/chat.js" type="text/javascript"></script>
        <script src="/scripts/main.js" type="text/javascript"></script>
    </body>
</html>
