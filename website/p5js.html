<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <!-- Title the webiste tab -->
        <title>CappaBot</title>
        <!-- Use the pico stylesheet because it looks cool -->
        <link rel="stylesheet" href="/styles/pico.min.css" type="text/css">
        <meta name="viewport" content="width=device-width">
        <meta name="description" content="p5.js testing page made by CappaBot.">
    </head>
    <body>
        <!-- Main pico container -->
        <main class="container">
            <hgroup>
                <h1><a href="/">CappaBot</a></h1>
                <p>Welcome to the CappaBot website!</p>
            </hgroup>

            <h2><a href="https://p5js.org/" target="_blank">p5.js</a> testing page</h2>

            <p>
                Press the buttons to do things<br>
                <button onclick="deleteTests()">Delete tests</button>
                <button onclick="toggleAutoDelete()" id="autoDeleteButton">Auto delete</button>
                <br>
                <button onclick="runTest(bouncingBall, 'p5')">Bouncing circle</button>
                <button onclick="runTest(bouncingBalls, 'p5')">Bouncing circles</button>
                <button onclick="runTest(badPendulum, 'p5')">Bad double pendulum</button>
            </p>

            <div id="test-container"></div>
            <p id="loading-message">Loading...</p>
            <script defer src="https://cdn.jsdelivr.net/npm/p5@1.11.2/lib/p5.min.js"></script>
            <script defer src="/scripts/p5-test.js"></script>
            <script defer src="/scripts/loading-done.js"></script>

            <footer>
                Made by CappaBot<br>
                <a href="/terms-of-service">Terms of service</a> | <a href="/privacy-policy">Privacy policy</a>
            </footer>
        </main>
        <script src="/scripts/main.js" type="text/javascript"></script>
    </body>
</html>
